<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriTrack — Трекер питания</title>
  <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
  <link rel="apple-touch-icon" href="/favicon.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/css/main.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header__inner">
        <div class="header__logo">
          <span class="header__logo-icon">◈</span>
          <span class="header__logo-text">NutriTrack</span>
        </div>
        <nav class="nav">
          <button class="nav__item nav__item--active" data-page="search">
            <svg class="nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <span>Поиск</span>
          </button>
          <button class="nav__item" data-page="diary">
            <svg class="nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span>Дневник</span>
          </button>
          <button class="nav__item" data-page="planner">
            <svg class="nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>Рацион</span>
          </button>
          <button class="nav__item" data-page="profile">
            <svg class="nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
          </button>
        </nav>
        <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
          <svg class="theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <!-- Main content -->
    <main class="main">
      <!-- Search Page -->
      <section class="page page--search page--active" id="page-search">
        <div class="page__header">
          <h1 class="page__title">Найти продукт</h1>
          <p class="page__subtitle">Узнайте калорийность и состав любого продукта</p>
        </div>
        <div class="search">
          <div class="search__bar">
            <svg class="search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input class="search__input" id="searchInput" type="text" placeholder="Например: куриная грудка, яблоко, гречка..." autocomplete="off" />
            <button class="search__clear" id="searchClear" aria-label="Очистить">✕</button>
          </div>
          <div class="search__results" id="searchResults"></div>
        </div>

        <!-- Product modal -->
        <div class="modal" id="productModal">
          <div class="modal__overlay" id="modalOverlay"></div>
          <div class="modal__window">
            <button class="modal__close" id="modalClose">✕</button>
            <div class="modal__content" id="modalContent"></div>
          </div>
        </div>
      </section>

      <!-- Diary Page -->
      <section class="page page--diary" id="page-diary">
        <div class="page__header">
          <h1 class="page__title">Дневник питания</h1>
          <div class="diary__date-nav">
            <button class="diary__date-btn" id="prevDay">‹</button>
            <span class="diary__date" id="currentDate"></span>
            <button class="diary__date-btn" id="nextDay">›</button>
          </div>
        </div>
        <div class="diary__summary" id="diarySummary"></div>
        <div class="diary__meals" id="diaryMeals"></div>
      </section>

      <!-- Planner Page -->
      <section class="page page--planner" id="page-planner">
        <div class="page__header">
          <h1 class="page__title">Рацион за неделю</h1>
          <p class="page__subtitle">Отслеживайте питание</p>
        </div>
        <div class="planner__week" id="plannerWeek"></div>
        <div class="planner__stats" id="plannerStats"></div>
      </section>

      <!-- Profile Page -->
      <section class="page page--profile" id="page-profile">
        <div class="page__header">
          <h1 class="page__title">Мой профиль</h1>
        </div>
        <div class="profile__grid" id="profileGrid"></div>
      </section>
    </main>

    <!-- Mobile nav -->
    <nav class="mobile-nav">
      <button class="mobile-nav__item mobile-nav__item--active" data-page="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span>Поиск</span>
      </button>
      <button class="mobile-nav__item" data-page="diary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Дневник</span>
      </button>
      <button class="mobile-nav__item" data-page="planner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Рацион</span>
      </button>
      <button class="mobile-nav__item" data-page="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Профиль</span>
      </button>
    </nav>

    <!-- Toast notifications -->
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
